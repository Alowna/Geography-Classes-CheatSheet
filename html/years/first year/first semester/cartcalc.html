<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculos Cartográficos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../../styles/style.css">

</head>
<body>
    <header class="p-3 bg-dark text-white">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                    <li>
                        <a href="firstsemester.html" class="nav-link px-2 text-white">1º Semestre</a>
                    </li>
                    <li>
                        <a href="cartcalc.html" class="nav-link px-2 text-secondary">Cálculos Cartográficos</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 text-white">Climatologia</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 text-white">Pensamento Geográfico</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 text-white">Geologia</a>
                    </li>

                </ul>
            </div>
        </div>
    </header>

    <h1>Conversor de Medidas</h1>
        <div class="mb-3">
            <input type="text" class="form-control" id="centimeters" placeholder="Centimetros">
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" id="meters" placeholder="Metros">
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" id="kilometers" placeholder="Kilometros">
        </div>

    <h1>Escala</h1>
        <div class="mb-3">
            <label for="measuredValueCm" class="form-label">Valor Medido (cm)</label>
            <input type="text" class="form-control" id="measuredValueCm" placeholder="Ex: 5">
        </div>
        <div class="mb-3">
            <label for="realValueCm" class="form-label">Valor Real (cm)</label>
            <input type="text" class="form-control" id="realValueCm" placeholder="Ex: 500000">
        </div>
        <div class="mb-3">
            <label class="form-label">Escala:</label>
            <span id="scaleResult" class="form-control">1 : ?</span>
        </div>

    <h1>Coordenadas Cartográficas</h1>

    <div class="container" style="margin-right:0px;">
    <div class="row">
        <div class="col">
            <h5>Variações do Mapa</h5>
            <div class="row">
                <h6 class="text-center">Longitude</h6>
                <div class="col">
                    <label class="form-label">Minuto</label>
                    <input type="number" class="form-control" id="longitudeVariationMinute" placeholder="?'">
                    <label class="form-label">Centimetros</label>
                    <input type="number" class="form-control" id="longitudeVariationCentimeters" placeholder="?cm">

                </div>
                <div class="col">
                    <label class="form-label">Segundo</label>
                    <input type="number" class="form-control" id="longitudeVariationSecond" placeholder="?''">
                    <label class="form-label">Cardial</label>
                    <select class="form-control" id="longitudeVariationBound">
                        <option id="East">Leste</option>
                        <option id="West">Oeste</option>
                    </select>
                </div>
            </div>
            <br>
            <div class="row">
                <h6 class="text-center">Latitude</h6>
                <div class="col">
                    <label class="form-label">Minuto</label>
                    <input type="number" class="form-control" id="latitudeVariationMinute" placeholder="?'">
                    <label class="form-label">Centimetros</label>
                    <input type="number" class="form-control" id="latitudeVariationCentimeters" placeholder="?cm">

                </div>
                <div class="col">
                    <label class="form-label">Segundo</label>
                    <input type="number" class="form-control" id="latitudeVariationSecond" placeholder="?''">
                    <label class="form-label">Cardial</label>
                    <select class="form-control" id="latitudeVariationBound">
                        <option id="North">Norte</option>
                        <option id="South">Sul</option>
                    </select>
                </div>
            </div>
            <br>

        </div>
        <div class="col">
            <br>
            <h5>Medidas do Local</h5>
            <div class="row">
                <div class="col">
                    <label class="form-label">Longitude</label>
                    <input type="number" class="form-control" id="localCentimetersLongitude" placeholder="?cm">
                </div>
                <div class="col">
                    <label class="form-label">Latitude</label>
                    <input type="number" class="form-control" id="localCentimetersLatitude" placeholder="?cm">
                </div>
            </div>
            <br>
            <div class="row">
                <h5 class="text-center">Posição do Mapa</h5>
                <div class="col">
                    <h6 class="text-center">Lontitude</h6>
                    <label class="form-label">Minuto</label>
                    <input type="number" class="form-control" id="mapLongitudeMinute" placeholder="?'">
                    <label class="form-label">Segundos</label>
                    <input type="number" class="form-control" id="mapLongitudeSeconds" placeholder="?''">
                </div>
                <div class="col">
                    <h6 class="text-center">Latitude</h6>
                    <label class="form-label">Minuto</label>
                    <input type="number" class="form-control" id="mapLatitudeMinute" placeholder="?'">
                    <label class="form-label">Segundos</label>
                    <input type="number" class="form-control" id="mapLatitudeSeconds" placeholder="?''">
                </div>
            </div>           
        </div>
        <button type="button" class="btn btn-dark">Calcular</button>
    </div>
    </div>
        



    <script type="module" src="cartcalc.js"></script>
</body>
</html>
